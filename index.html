<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vape Shop Elite</title>
    <!-- Подключаем Telegram WebApp API -->
    <script src="https://telegram.org"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #0a0a0a; color: #ffffff; padding: 16px; padding-bottom: 110px; }
        
        h2 { font-size: 24px; font-weight: 700; margin-bottom: 20px; }
        .section-title { font-size: 14px; text-transform: uppercase; color: #8e8e93; letter-spacing: 1px; margin: 24px 0 12px 0; }
        
        /* Стеклянные карточки товаров */
        .glass-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 14px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { display: flex; flex-direction: column; gap: 4px; }
        .item-name { font-size: 16px; font-weight: 600; }
        .item-desc { font-size: 12px; color: #8e8e93; }
        .item-price { font-size: 15px; font-weight: 700; margin-top: 4px; }
        
        /* Прозрачные кнопки iOS */
        .glass-btn { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15); color: #ffffff; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .counter-box { display: flex; align-items: center; gap: 12px; }
        .counter-btn { width: 28px; height: 28px; border-radius: 50px; display: flex; align-items: center; justify-content: center; }
        
        /* Нижнее меню (Каталог / Профиль) */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-top: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #8e8e93; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: #ffffff; font-weight: 600; }
        .nav-icon { font-size: 20px; }

        /* Всплывающая плашка корзины */
        .cart-dock { position: fixed; bottom: 80px; left: 16px; right: 16px; background: rgba(30, 30, 30, 0.7); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 16px; display: flex; justify-content: space-between; align-items: center; transform: translateY(200%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 90; }
        .cart-dock.active { transform: translateY(0); }
        .checkout-btn { background: #ffffff; color: #000000; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; }

        /* Экраны страниц */
        .page { display: none; }
        .page.active { display: block; }
        .loader { text-align: center; color: #8e8e93; margin-top: 50px; }

        /* Выезжающая шторка выбора района */
        .ios-sheet-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; z-index: 200; }
        .ios-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #1c1c1e; border-top-left-radius: 16px; border-top-right-radius: 16px; padding: 24px 16px; transform: translateY(100%); transition: transform 0.3s ease-out; z-index: 201; }
        .ios-sheet.active { transform: translateY(0); }
        .sheet-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 20px; }
        .district-option { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; text-align: center; margin-bottom: 10px; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .district-option:active { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <!-- ВКЛАДКА: КАТАЛОГ -->
    <div id="page-catalog" class="page active">
        <h2>💨 Каталог товаров</h2>
        <div id="catalog"><div class="loader">Загрузка товаров...</div></div>
    </div>

    <!-- ВКЛАДКА: ПРОФИЛЬ -->
    <div id="page-profile" class="page">
        <h2>👤 Мой профиль</h2>
        <div class="glass-card" style="flex-direction: column; align-items: flex-start; gap: 10px; width: 100%;">
            <div>Имя: <span id="prof-name" style="font-weight: 600;">Покупатель</span></div>
            <div>Юзернейм: <span id="prof-username" style="color: #8e8e93;">@username</span></div>
        </div>
    </div>

    <!-- Нижние вкладки навигации -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchPage('catalog', this)">
            <span class="nav-icon">💨</span><span>Каталог</span>
        </div>
        <div class="nav-item" onclick="switchPage('profile', this)">
            <span class="nav-icon">👤</span><span>Профиль</span>
        </div>
    </div>

    <!-- Всплывающая Корзина -->
    <div class="cart-dock" id="cartDock">
        <div>
            <span id="cartCount" style="font-size: 12px; color: #8e8e93;">Товаров: 0</span>
            <div id="cartTotal" style="font-size:18px; font-weight:700;">0.00 Br</div>
        </div>
        <button class="checkout-btn" onclick="openDistrictSheet()">Заказать</button>
    </div>

    <!-- Шторка выбора района -->
    <div class="ios-sheet-overlay" id="sheetOverlay" onclick="closeDistrictSheet()"></div>
    <div class="ios-sheet" id="districtSheet">
        <div class="sheet-title">Выбери свой микрорайон</div>
        <div class="district-option" onclick="submitOrder('м-р Восточный')">📍 м-р Восточный</div>
        <div class="district-option" onclick="submitOrder('м-р Центр')">📍 м-р Центр</div>
        <div class="district-option" onclick="submitOrder('Досы')">📍 Досы</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 🔑 ТВОИ НАСТРОЙКИ КЛЮЧЕЙ СЮДА
        const AIRTABLE_TOKEN = "ВСТАВЬ_СЮДА_СВОЙ_ТОКЕН_PAT";
        const BASE_ID = "appM7TGBHwawnNWijs"; // ID твоей базы со скриншота

        let cart = {};
        let productsData = [];
        
        // Достаем данные юзера из Telegram API
        const user = tg.initDataUnsafe?.user || { first_name: "Покупатель", username: "vape_user" };

        // Переключение между Каталогом и Профилем
        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            element.classList.add('active');
            if(pageId === 'catalog') updateUI(); else document.getElementById('cartDock').classList.remove('active');
        }

        // Загрузка товаров из Airtable
        async function loadData() {
            try {
                const res = await fetch(`https://airtable.com{BASE_ID}/Products`, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
                const data = await res.json(); 
                productsData = data.records.map(r => r.fields); 
                renderCatalog();
            } catch(e) { 
                document.getElementById('catalog').innerText = "Ошибка загрузки продуктов. Проверь токен."; 
            }

            // Выводим инфу о юзере во вкладку профиля
            document.getElementById('prof-name').innerText = user.first_name;
            document.getElementById('prof-username').innerText = user.username ? `@${user.username}` : 'нет';
        }

        // Генерация карточек по категориям
        function renderCatalog() {
            const catalogDiv = document.getElementById('catalog'); catalogDiv.innerHTML = "";
            const categories = [...new Set(productsData.map(p => p.category))];
            categories.forEach(cat => {
                let html = `<div class="section-title">${cat}</div>`;
                productsData.filter(p => p.category === cat).forEach(p => {
                    html += `<div class="glass-card"><div class="item-info"><span class="item-name">${p.name}</span><span class="item-desc">${p.desc || ''}</span><span class="item-price">${parseFloat(p.price).toFixed(2)} Br</span></div><div id="btn-box-${p.id}"><button class="glass-btn" onclick="addToCart(${p.id},'${p.name}',${p.price})">В корзину</button></div></div>`;
                });
                catalogDiv.innerHTML += html;
            });
        }

        // Добавление в корзину и счетчик
        function addToCart(id, name, price) {
            if (!cart[id]) cart[id] = { name: name, price: price, count: 1 }; else cart[id].count++;
            document.getElementById(`btn-box-${id}`).innerHTML = `<div class="counter-box"><button class="glass-btn counter-btn" onclick="changeCount(${id},-1)">-</button><span style="font-weight:600; min-width:15px; text-align:center;">${cart[id].count}</span><button class="glass-btn counter-btn" onclick="changeCount(${id},1)">+</button></div>`;
            updateUI();
        }

        function changeCount(id, delta) {
            cart[id].count += delta;
            if(cart[id].count <= 0) { delete cart[id]; loadData(); return; }
            addToCart(id, cart[id].name, cart[id].price); cart[id].count--; updateUI();
        }

        // Обновление цен в корзине
        function updateUI() {
            let tc = 0; let tp = 0; for (let id in cart) { tc += cart[id].count; tp += cart[id].price * cart[id].count; }
            const dock = document.getElementById('cartDock');
            if (tc > 0 && document.getElementById('page-catalog').classList.contains('active')) dock.classList.add('active'); else dock.classList.remove('active');
            document.getElementById('cartCount').innerText = `Товаров: ${tc}`; document.getElementById('cartTotal').innerText = `${tp.toFixed(2)} Br`;
        }

        // Управление шторкой районов
        function openDistrictSheet() {
            document.getElementById('sheetOverlay').style.display = 'block';
            setTimeout(() => document.getElementById('districtSheet').classList.add('active'), 50);
        }
        function closeDistrictSheet() {
            document.getElementById('districtSheet').classList.remove('active');
            setTimeout(() => document.getElementById('sheetOverlay').style.display = 'none', 300);
        }

        // Отправка заказа боту
        function submitOrder(districtName) {
            let orderItems = []; let totalPrice = 0;
            for (let id in cart) {
                orderItems.push({ name: cart[id].name, count: cart[id].count, price: cart[id].price });
                totalPrice += cart[id].price * cart[id].count;
            }
            
            const result = { items: orderItems, totalPrice: totalPrice.toFixed(2), district: districtName };
            tg.sendData(JSON.stringify(result));
            tg.close();
        }

        loadData();
    </script>
</body>
</html>
